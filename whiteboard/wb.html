<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../dist/shared.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Whiteboard Pro</title>
  <link rel="stylesheet" href="wb.css">
</head>

<body>

<a class="skip-link" href="#main-content">
  Skip to main content
</a>

<main id="main-content">

<div class="whiteboard-container">

  <header class="toolbar">

    <div class="toolbar-left">
      <h2>🎨 Whiteboard Pro</h2>
    </div>

    <div class="tools">

      <div class="tool-group">
        <label for="colorPicker">Color</label>
        <input type="color" id="colorPicker" value="#2563eb">
      </div>

      <div class="tool-group">
        <label for="brushSize">
          Size <span id="sizeValue">4</span>px
        </label>

        <input
          type="range"
          id="brushSize"
          min="1"
          max="30"
          value="4"
        >
      </div>

      <button class="tool-btn active" id="penBtn">
        ✏️ Pen
      </button>

      <button class="tool-btn" id="eraserBtn">
        🧽 Eraser
      </button>

      <button class="tool-btn" id="undoBtn">
        ↶ Undo
      </button>

      <button class="tool-btn" id="redoBtn">
        ↷ Redo
      </button>

      <button class="tool-btn danger" id="clearBtn">
        🗑 Clear
      </button>

      <button class="tool-btn success" id="saveBtn">
        💾 Save
      </button>

    </div>

  </header>

  <section class="canvas-wrapper">
    <canvas id="canvas"></canvas>
  </section>

  <footer class="status-bar">
    <span>Ready</span>
    <span>Shortcut: Ctrl + Z (Undo)</span>
  </footer>

</div>

</main>

<script src="wb.js"></script>
<script src="../dist/shared.js"></script>

</body>
</html>
