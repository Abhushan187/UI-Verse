<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Modern CSS Components, Animations, Cards, Buttons, Forms and UI Patterns."
  >

  <meta
    name="theme-color"
    content="#050816"
  >

  <meta
    name="color-scheme"
    content="dark light"
  >

  <title>UIverse — CSS Component Library</title>

  <!-- Improve connection speed -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  >

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <!-- Shared styles -->
  <link
    rel="stylesheet"
    href="dist/shared.css"
  >

  <!-- Main bundle -->
  <link
    rel="stylesheet"
    href="dist/css/main.css"
  >

  <!-- Favicon -->
  <link
    rel="icon"
    href="/favicon.ico"
    sizes="any"
  >

  <!-- Social Preview -->
  <meta
    property="og:title"
    content="UIverse — CSS Component Library"
  >

  <meta
    property="og:description"
    content="Modern CSS Components, Animations, Cards, Buttons, Forms and UI Patterns."
  >

  <meta
    property="og:type"
    content="website"
  >

  <!-- Preload hero image if used immediately -->
  <!--
  <link
    rel="preload"
    as="image"
    href="dist/images/hero.webp"
  >
  -->
</head>

<body>

  <a
    class="skip-link"
    href="#main-content"
  >
    Skip to main content
  </a>

  <main id="main-content">

    <div id="app"></div>

    <!-- Optional loading placeholder -->
    <noscript>
      <p>
        JavaScript is required to load this application.
      </p>
    </noscript>

  </main>

  <!-- Shared utilities -->
  <script src="dist/shared.js" defer></script>

  <!-- Main application -->
  <script
    type="module"
    src="dist/js/main.js"
  ></script>

</body>
</html>
