<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tooltip Components — UIverse</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#09090f;
  --card:#14141f;
  --border:rgba(255,255,255,.08);
  --text:#fff;
  --muted:#9ca3af;
  --primary:#7c3aed;
  --secondary:#06b6d4;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"DM Sans",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

.hero{
  text-align:center;
  padding:80px 20px;
}

.hero h1{
  font-family:"Syne",sans-serif;
  font-size:clamp(2.5rem,5vw,5rem);
  margin-bottom:1rem;
}

.hero p{
  color:var(--muted);
  max-width:700px;
  margin:auto;
}

.grid{
  max-width:1200px;
  margin:auto;
  padding:40px 20px 100px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px;
  text-align:center;
  transition:.35s ease;
}

.card:hover{
  transform:translateY(-8px);
  border-color:rgba(124,58,237,.5);
}

.demo-title{
  margin-bottom:30px;
  font-weight:700;
}

.tooltip-wrapper{
  position:relative;
  display:inline-block;
}

.btn{
  padding:12px 24px;
  border:none;
  border-radius:14px;
  background:linear-gradient(
    135deg,
    var(--primary),
    var(--secondary)
  );
  color:white;
  cursor:pointer;
  font-weight:600;
}

.tooltip{
  position:absolute;
  background:#111827;
  color:white;
  padding:10px 14px;
  border-radius:12px;
  white-space:nowrap;
  opacity:0;
  visibility:hidden;
  transition:.25s;
  font-size:.875rem;
}

.tooltip-wrapper:hover .tooltip{
  opacity:1;
  visibility:visible;
}

/* Top */
.top{
  bottom:120%;
  left:50%;
  transform:translateX(-50%);
}

/* Bottom */
.bottom{
  top:120%;
  left:50%;
  transform:translateX(-50%);
}

/* Left */
.left{
  right:120%;
  top:50%;
  transform:translateY(-50%);
}

/* Right */
.right{
  left:120%;
  top:50%;
  transform:translateY(-50%);
}

.section-heading{
  text-align:center;
  font-family:"Syne",sans-serif;
  font-size:2rem;
  margin-bottom:20px;
}

.badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(124,58,237,.15);
  color:#a78bfa;
  margin-bottom:16px;
}
</style>
</head>

<body>

<header class="hero">
  <div class="badge">UIverse Components</div>

  <h1>Tooltip Components</h1>

  <p>
    Discover modern tooltip designs featuring clean animations,
    glassmorphism styling, responsive layouts, and accessible interactions.
  </p>
</header>

<section>
  <h2 class="section-heading">Tooltip Variants</h2>

  <div class="grid">

    <div class="card">
      <div class="demo-title">Top Tooltip</div>

      <div class="tooltip-wrapper">
        <button class="btn">Hover Me</button>
        <span class="tooltip top">
          Appears Above
        </span>
      </div>
    </div>

    <div class="card">
      <div class="demo-title">Bottom Tooltip</div>

      <div class="tooltip-wrapper">
        <button class="btn">Hover Me</button>
        <span class="tooltip bottom">
          Appears Below
        </span>
      </div>
    </div>

    <div class="card">
      <div class="demo-title">Left Tooltip</div>

      <div class="tooltip-wrapper">
        <button class="btn">Hover Me</button>
        <span class="tooltip left">
          Appears Left
        </span>
      </div>
    </div>

    <div class="card">
      <div class="demo-title">Right Tooltip</div>

      <div class="tooltip-wrapper">
        <button class="btn">Hover Me</button>
        <span class="tooltip right">
          Appears Right
        </span>
      </div>
    </div>

  </div>
</section>

</body>
</html>
